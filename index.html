<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Kriptografi Caesar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>🔐 Caesar Cipher</h2>
        <p>Aplikasi enkripsi pergeseran alfabet.</p>
        
        <div class="input-group">
            <label>Pesan Asli / Sandi:</label>
            <textarea id="inputText" placeholder="Ketik pesan di sini..."></textarea>
        </div>

        <div class="input-group">
            <label>Kunci (Key):</label>
            <input type="number" id="keyInput" value="3" placeholder="Contoh: 3">
        </div>

        <div class="actions">
            <button onclick="handleProcess(true)" class="btn-enc">Enkripsi</button>
            <button onclick="handleProcess(false)" class="btn-dec">Dekripsi</button>
        </div>

        <div class="result-area">
            <label>Hasil:</label>
            <div id="resultText">Hasil akan muncul di sini...</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
